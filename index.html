<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>环境感知 Ambient Sense</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0a0a0b; --surface: rgba(255,255,255,0.03); --surface2: rgba(255,255,255,0.06);
  --border: rgba(255,255,255,0.06); --text: rgba(255,255,255,0.85);
  --text2: rgba(255,255,255,0.45); --text3: rgba(255,255,255,0.25);
  --accent: #4ade80; --accent2: #22d3ee; --warm: #fb923c;
  --mono: 'JetBrains Mono', monospace; --sans: 'DM Sans', -apple-system, sans-serif;
}
body { background: var(--bg); color: var(--text); font-family: var(--sans); height: 100vh; overflow: hidden; }

.app { display: grid; grid-template-columns: 1fr 2fr; height: 100vh; }

/* ── Source panel ── */
.source-panel { display: flex; flex-direction: column; border-right: 1px solid var(--border); }
.panel-bar { padding: 10px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.panel-bar h2 { font-size: 12px; font-weight: 500; flex: 1; }
.tab-btn { padding: 3px 10px; font-size: 10px; border-radius: 5px; border: 1px solid var(--border); background: transparent; color: var(--text3); cursor: pointer; font-family: var(--sans); }
.tab-btn.active { background: var(--surface2); color: var(--text); border-color: rgba(255,255,255,0.12); }

.source-view { flex: 1; position: relative; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
.source-view video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
.upload-zone { display: none; flex-direction: column; align-items: center; gap: 10px; color: var(--text3); cursor: pointer; width: 100%; height: 100%; justify-content: center; }
.upload-zone.active { display: flex; }
.upload-zone .uz-icon { font-size: 36px; opacity: 0.25; }
.upload-zone .uz-text { font-size: 11px; }
.upload-zone.dragover { background: rgba(74,222,128,0.05); }
.preview-img { display: none; max-width: 100%; max-height: 100%; object-fit: contain; cursor: pointer; }

.cam-overlay { position: absolute; inset: 0; pointer-events: none; }
.scan-line { position: absolute; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--accent), transparent); opacity: 0; animation: scan 4s ease-in-out infinite; }
@keyframes scan { 0% { top:0; opacity:0; } 10% { opacity:0.4; } 90% { opacity:0.4; } 100% { top:100%; opacity:0; } }
.corner { position: absolute; width: 18px; height: 18px; }
.corner::before, .corner::after { content:''; position: absolute; background: var(--accent); opacity: 0.4; }
.corner-tl { top:10px; left:10px; } .corner-tl::before { width:18px; height:1.5px; } .corner-tl::after { width:1.5px; height:18px; }
.corner-tr { top:10px; right:10px; } .corner-tr::before { right:0; width:18px; height:1.5px; } .corner-tr::after { right:0; width:1.5px; height:18px; }
.corner-bl { bottom:10px; left:10px; } .corner-bl::before { bottom:0; width:18px; height:1.5px; } .corner-bl::after { bottom:0; width:1.5px; height:18px; }
.corner-br { bottom:10px; right:10px; } .corner-br::before { bottom:0; right:0; width:18px; height:1.5px; } .corner-br::after { bottom:0; right:0; width:1.5px; height:18px; }
.cam-status { position: absolute; top:10px; left:50%; transform: translateX(-50%); display: flex; align-items: center; gap:5px; padding:3px 10px; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); border:1px solid var(--border); border-radius:14px; font-size:10px; font-family: var(--mono); color: var(--text2); }
.cam-status .dot { width:5px; height:5px; border-radius:50%; background: var(--accent); animation: blink 2s ease-in-out infinite; }
.cam-status.analyzing .dot { background: var(--warm); animation: blink 0.5s ease-in-out infinite; }
@keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

.captured-frame { position: absolute; bottom:10px; right:10px; width:100px; border-radius:5px; border:1px solid var(--border); overflow: hidden; opacity:0; transition: opacity 0.3s; }
.captured-frame.visible { opacity:1; }
.captured-frame img { width:100%; display:block; }
.captured-frame .cf-label { position:absolute; bottom:0; left:0; right:0; padding:2px; background:rgba(0,0,0,0.7); font-size:8px; font-family:var(--mono); color:var(--text3); text-align:center; }

.source-bottom { padding:8px 14px; border-top:1px solid var(--border); flex-shrink:0; }
.source-bottom select { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:5px; color:var(--text); padding:5px 8px; font-size:11px; font-family:var(--mono); outline:none; }

/* ── Results panel ── */
.results-panel { display: flex; flex-direction: column; border-right: 1px solid var(--border); overflow: hidden; }
.results-body { flex:1; display: flex; flex-direction: column; overflow: hidden; position: relative; }

.stats-row { display: none; }

/* Scene topology */
.scene-topo { padding: 12px 14px; border-bottom: 1px solid var(--border); height: 60%; flex-shrink: 0; min-height: 0; overflow: hidden; }
.topo-svg { width: 100%; height: 100%; }
.topo-node { cursor: default; }
.topo-node text { fill: var(--text); font-family: var(--sans); font-size: 10px; text-anchor: middle; }
.topo-node .node-icon { font-size: 24px; }
.topo-node .node-label { fill: var(--text2); font-size: 8px; }
.topo-node .node-sub { fill: var(--text3); font-size: 7px; font-family: var(--mono); }
.topo-path { fill: none; stroke: var(--accent); stroke-width: 1.5; opacity: 0.5; stroke-dasharray: 6 3; animation: dash 1.5s linear infinite; }
.topo-path.alt { stroke: var(--text3); stroke-dasharray: 3 4; opacity: 0.3; animation: none; }
@keyframes dash { to { stroke-dashoffset: -18; } }
.topo-ai-glow { fill: rgba(74,222,128,0.08); stroke: rgba(74,222,128,0.15); stroke-width: 1; }
.topo-device-ring { fill: var(--surface); stroke: var(--border); stroke-width: 1; }
.topo-device-ring.active { stroke: rgba(74,222,128,0.3); fill: rgba(74,222,128,0.04); }
.topo-person-ring { fill: var(--surface); stroke: var(--border); stroke-width: 1; }

/* Interaction card */
.interaction-card { padding: 10px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.ic-row { display: flex; gap: 8px; align-items: stretch; }
.ic-main { flex: 1; background: rgba(74,222,128,0.04); border: 1px solid rgba(74,222,128,0.15); border-radius: 8px; padding: 10px 12px; }
.ic-main .ic-header { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
.ic-main .ic-channel { font-size: 13px; font-weight: 500; }
.ic-main .ic-style { font-size: 9px; font-family: var(--mono); color: var(--accent); background: rgba(74,222,128,0.1); padding: 1px 6px; border-radius: 6px; }
.ic-main .ic-urgency { font-size: 9px; font-family: var(--mono); color: var(--warm); background: rgba(251,146,60,0.1); padding: 1px 6px; border-radius: 6px; margin-left: auto; }
.ic-main .ic-content { font-size: 11px; color: var(--text); margin: 6px 0 4px; padding: 6px 8px; background: rgba(255,255,255,0.03); border-radius: 5px; border-left: 2px solid var(--accent); line-height: 1.5; }
.ic-main .ic-reason { font-size: 10px; color: var(--text2); line-height: 1.4; }
.ic-main .ic-example { font-size: 10px; color: var(--text3); font-style: italic; margin-top: 3px; }

.detail-grid { flex:1; display:grid; grid-template-columns:1fr 1fr; overflow:hidden; }
.detail-col { padding:8px 14px; overflow-y:auto; }
.detail-col:first-child { border-right:1px solid var(--border); }
.detail-col::-webkit-scrollbar { width:2px; }
.detail-col::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.06); }
.detail-title { font-size:9px; font-family:var(--mono); color:var(--text3); text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; }
.det-item { display:flex; align-items:center; gap:6px; padding:4px 6px; background:var(--surface); border:1px solid var(--border); border-radius:5px; font-size:10px; margin-bottom:3px; }
.det-item .di-icon { font-size:13px; }
.det-item .di-name { flex:1; }
.det-item .di-type { font-size:8px; font-family:var(--mono); color:var(--text3); }
.ctx-tags { display:flex; flex-wrap:wrap; gap:3px; }
.ctx-tag { font-size:10px; padding:2px 7px; border-radius:8px; background:var(--surface2); border:1px solid var(--border); color:var(--text2); }

.empty-state { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; }
.empty-state .es-icon { font-size:26px; margin-bottom:8px; opacity:0.2; }
.analyzing-spinner { animation: spin 1.5s linear infinite; opacity:0.5 !important; }
@keyframes spin { from { transform:rotate(0deg); } to { transform:rotate(360deg); } }
.empty-state .es-text { font-size:11px; color:var(--text3); line-height:1.6; text-align:center; }

.analyzing-float { display:none; padding:2px 8px; background:rgba(251,146,60,0.1); border:1px solid rgba(251,146,60,0.2); border-radius:8px; font-size:9px; font-family:var(--mono); color:var(--warm); align-items:center; gap:4px; margin-left:8px; vertical-align:middle; }
.analyzing-float.visible { display:inline-flex; }
.analyzing-float .af-dot { width:6px; height:6px; border-radius:50%; background:var(--warm); animation:blink 0.5s ease-in-out infinite; }

/* ── Config panel (overlay drawer) ── */
.config-panel { position: fixed; top: 0; right: -340px; width: 320px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); border-left: 1px solid var(--border); z-index: 100; transition: right 0.25s ease; }
.config-panel.open { right: 0; }
.config-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 99; }
.config-overlay.open { display: block; }
.settings-btn { position: absolute; top: 10px; right: 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; color: var(--text2); cursor: pointer; font-size: 14px; padding: 4px 8px; z-index: 10; transition: all 0.2s; }
.settings-btn:hover { background: var(--surface2); color: var(--text); }
.config-body { flex:1; overflow-y:auto; padding:10px 14px; }
.config-body::-webkit-scrollbar { width:2px; }
.config-body::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.06); }
.cfg-group { margin-bottom:10px; }
.cfg-label { font-size:9px; font-family:var(--mono); color:var(--text3); text-transform:uppercase; letter-spacing:1px; margin-bottom:3px; }
.cfg-input { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:5px; color:var(--text); padding:6px 8px; font-size:11px; font-family:var(--mono); outline:none; }
.cfg-input:focus { border-color:rgba(255,255,255,0.15); }
.cfg-input::placeholder { color:var(--text3); }

.hist-item { padding:5px 0; border-bottom:1px solid var(--border); }
.hist-item:last-child { border-bottom:none; }
.hist-time { font-family:var(--mono); color:var(--text3); font-size:8px; }
.hist-text { color:var(--text2); font-size:10px; margin-top:1px; line-height:1.4; }

.raw-toggle { font-size:9px; color:var(--text3); cursor:pointer; border:none; background:none; font-family:var(--mono); padding:3px 0; }
.raw-toggle:hover { color:var(--text2); }
.raw-output { font-family:var(--mono); font-size:9px; color:var(--text2); line-height:1.4; white-space:pre-wrap; word-break:break-word; background:var(--surface); border:1px solid var(--border); border-radius:5px; padding:6px; max-height:120px; overflow-y:auto; display:none; margin-top:4px; }
.raw-output.visible { display:block; }

.config-controls { padding:10px 14px; border-top:1px solid var(--border); display:flex; gap:6px; flex-shrink:0; }
.btn { flex:1; padding:8px; border-radius:6px; font-size:11px; font-family:var(--sans); font-weight:500; cursor:pointer; border:1px solid var(--border); background:var(--surface); color:var(--text); transition:all 0.2s; }
.btn:hover { background:var(--surface2); }
.btn.primary { background:rgba(74,222,128,0.1); border-color:rgba(74,222,128,0.2); color:var(--accent); }
.btn.primary:hover { background:rgba(74,222,128,0.18); }
.btn.danger { color:#f87171; border-color:rgba(248,113,113,0.15); }
.btn.danger:hover { background:rgba(248,113,113,0.08); }

@media (max-width:700px) { .app { grid-template-columns:1fr; grid-template-rows:35vh 1fr; } }
</style>
</head>
<body>
<div class="app">
  <!-- Source -->
  <div class="source-panel">
    <div class="panel-bar">
      <h2>画面采集</h2>
      <button class="tab-btn active" id="tabCamera" onclick="switchSource('camera')">摄像头</button>
      <button class="tab-btn" id="tabUpload" onclick="switchSource('upload')">上传</button>
    </div>
    <div class="source-view" id="sourceView">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="captureCanvas" style="display:none"></canvas>
      <div class="cam-overlay" id="camOverlay">
        <div class="scan-line"></div>
        <div class="corner corner-tl"></div><div class="corner corner-tr"></div>
        <div class="corner corner-bl"></div><div class="corner corner-br"></div>
      </div>
      <div class="cam-status" id="cameraStatus"><div class="dot"></div><span id="statusText">等待中</span></div>
      <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
        <div class="uz-icon">📷</div><div class="uz-text">点击或拖拽图片</div>
      </div>
      <img class="preview-img" id="previewImg" />
      <input type="file" id="fileInput" accept="image/*" style="display:none" />
      <div class="captured-frame" id="capturedFrame"><img id="capturedImg" /><div class="cf-label">采集帧</div></div>
    </div>
    <div class="source-bottom" id="sourceBottom"><select id="cameraSelect"><option value="">加载中...</option></select></div>
  </div>

  <!-- Results -->
  <div class="results-panel">
    <div class="panel-bar" style="position:relative"><h2>分析结果 <span class="analyzing-float" id="analyzingState"><span class="af-dot"></span>分析中</span></h2><button class="settings-btn" onclick="toggleSettings()">⚙</button></div>
    <div class="results-body" id="resultsBody">
      <!-- Scene Topology -->
      <div class="scene-topo" id="sceneTopo" style="display:none">
        <svg class="topo-svg" id="topoSvg" viewBox="0 0 500 160" preserveAspectRatio="xMidYMid meet"></svg>
      </div>

      <!-- Interaction Card -->
      <div class="interaction-card" id="interactionCard" style="display:none">
        <div class="ic-row">
          <div class="ic-main">
            <div class="ic-header">
              <span class="ic-channel" id="icChannel"></span>
              <span class="ic-style" id="icStyle"></span>
              <span class="ic-urgency" id="icUrgency"></span>
            </div>
            <div class="ic-content" id="icContent"></div>
            <div class="ic-reason" id="icReason"></div>
            <div class="ic-example" id="icExample"></div>
          </div>
        </div>
      </div>
      <div class="detail-grid" id="detailGrid" style="display:none">
        <div class="detail-col"><div class="detail-title">检测到的对象</div><div id="detectedList"></div></div>
        <div class="detail-col"><div class="detail-title">场景上下文</div><div class="ctx-tags" id="contextTags"></div><div style="margin-top:8px"><div class="detail-title">备选方案</div><div id="altText" style="font-size:10px;color:var(--text2);line-height:1.4"></div></div></div>
      </div>
      <div class="empty-state" id="emptyState"><div class="es-icon">👁</div><div class="es-text">填入密钥，点击「开始」<br>或上传图片进行分析</div></div>
    </div>
    <div class="config-controls">
      <input class="cfg-input" type="text" id="userContent" placeholder="需要告知用户的内容（可选）" style="flex:2;margin-right:2px" />
      <button class="btn primary" id="startBtn" onclick="toggleAnalysis()">开始</button>
      <button class="btn" onclick="analyzeOnce()">分析一次</button>
    </div>
  </div>

  <!-- Config Overlay -->
  <div class="config-overlay" id="configOverlay" onclick="toggleSettings()"></div>

  <!-- Config (drawer) -->
  <div class="config-panel" id="configPanel">
    <div class="panel-bar" style="position:relative"><h2>设置</h2><button class="settings-btn" style="right:0" onclick="toggleSettings()">✕</button></div>
    <div class="config-body">
      <div class="cfg-group"><div class="cfg-label">服务商</div><select class="cfg-input" id="providerSelect"><option value="openai">OpenAI</option><option value="anthropic">Anthropic</option></select></div>
      <div class="cfg-group"><div class="cfg-label">接口地址</div><input class="cfg-input" type="text" id="baseUrl" placeholder="https://api.openai.com/v1" /></div>
      <div class="cfg-group"><div class="cfg-label">密钥</div><input class="cfg-input" type="password" id="apiKey" placeholder="sk-..." /></div>
      <div class="cfg-group"><div class="cfg-label">模型</div><input class="cfg-input" type="text" id="modelName" placeholder="gpt-4o" /></div>
      <div class="cfg-group"><div class="cfg-label">间隔</div><select class="cfg-input" id="intervalSelect"><option value="3000">3秒</option><option value="5000" selected>5秒</option><option value="10000">10秒</option><option value="15000">15秒</option></select></div>
      <div class="history-section" id="historySection" style="display:none"><div class="detail-title" style="margin-top:10px">历史记录</div><div id="historyList"></div></div>
      <div style="margin-top:8px"><button class="raw-toggle" onclick="toggleRaw()">▶ 原始数据</button><div class="raw-output" id="rawOutput"></div></div>
    </div>
  </div>
</div>

<script src="agentic-core.umd.js"></script>
<script>
const SYSTEM_PROMPT = `你是一个环境感知分析器。你通过摄像头观察场景，分析当前环境，推荐 AI 与在场人员交互的最佳方式。

核心理念：AI 无处不在——不同设备只是它的身体和手脚。你来决定用哪个"肢体"最合适。

请用以下 JSON 格式回复（所有文本内容用中文）：
{
  "people": [
    { "id": "p1", "description": "简要描述（如：戴眼镜的男性）", "activity": "在做什么", "attention": "专注/分心/空闲" }
  ],
  "devices": [
    { "id": "d1", "type": "laptop|phone|tablet|tv|speaker|watch|monitor|other", "description": "简要描述", "screen_state": "开/关/未知" }
  ],
  "scene": {
    "setting": "办公室/家/厨房/户外等",
    "lighting": "明亮/昏暗/黑暗",
    "noise_level": "安静/适中/嘈杂",
    "activity_type": "工作/聊天/做饭/休息/演示/走路/吃饭等"
  },
  "recommendation": {
    "primary_channel": "语音|屏幕|通知|震动|环境光|对话|主动告知|不打扰",
    "target_device": "用哪个设备的id（如d1），或'无'",
    "target_person": "目标人的id（如p1），或'所有人'",
    "modality": "文字|语音|视觉|触觉|环境",
    "interaction_style": "对话（等用户回应）|主动告知（单向推送信息）|静默推送（后台同步）|环境感知（融入环境不打扰）",
    "content": "具体想同步给用户的内容示例，如'您有一个15分钟后的会议'或'外卖已到楼下'",
    "urgency": "可以等|轻柔|立即",
    "reason": "1-2句话解释为什么这个方式最合适",
    "example": "举例说明 AI 会怎么响应"
  },
  "alternative": {
    "channel": "备选方式",
    "reason": "什么情况下用备选"
  },
  "context_tags": ["标签1", "标签2", "标签3"]
}

判断逻辑：手忙→语音，开会→静默通知，独自桌前→屏幕弹窗或对话，多人→共享屏幕，走路→语音或手表震动，做饭→语音简短主动告知，演示→绝对不打扰。
只返回合法 JSON，不要 markdown 包裹。所有描述用中文。`;

let video, canvas, ctx, analysisInterval = null, isRunning = false, history = [], sourceMode = 'camera', uploadedBase64 = null;

async function initCamera(deviceId) {
  video = document.getElementById('video');
  canvas = document.getElementById('captureCanvas');
  ctx = canvas.getContext('2d');
  if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
  const constraints = { video: deviceId ? { deviceId: { exact: deviceId }, width: { ideal: 1280 }, height: { ideal: 720 } } : { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } } };
  try {
    const stream = await navigator.mediaDevices.getUserMedia(constraints);
    video.srcObject = stream;
    setStatus('实时', false);
    await loadCameraList();
  } catch (e) { setStatus('无摄像头', false); }
}

async function loadCameraList() {
  const devices = await navigator.mediaDevices.enumerateDevices();
  const cameras = devices.filter(d => d.kind === 'videoinput');
  const select = document.getElementById('cameraSelect');
  const currentId = video.srcObject?.getVideoTracks()[0]?.getSettings().deviceId;
  select.innerHTML = cameras.map((c, i) => `<option value="${c.deviceId}" ${c.deviceId === currentId ? 'selected' : ''}>${c.label || '摄像头 ' + (i+1)}</option>`).join('');
}

document.getElementById('cameraSelect').addEventListener('change', e => { if (e.target.value) initCamera(e.target.value); });

function switchSource(mode) {
  sourceMode = mode;
  document.getElementById('tabCamera').classList.toggle('active', mode === 'camera');
  document.getElementById('tabUpload').classList.toggle('active', mode === 'upload');
  document.getElementById('video').style.display = mode === 'camera' ? '' : 'none';
  document.getElementById('camOverlay').style.display = mode === 'camera' ? '' : 'none';
  document.getElementById('cameraStatus').style.display = mode === 'camera' ? '' : 'none';
  document.getElementById('uploadZone').classList.toggle('active', mode === 'upload' && !uploadedBase64);
  document.getElementById('previewImg').style.display = mode === 'upload' && uploadedBase64 ? 'block' : 'none';
  document.getElementById('sourceBottom').style.display = mode === 'camera' ? '' : 'none';
}

// Upload handling
const fileInput = document.getElementById('fileInput');
const uploadZone = document.getElementById('uploadZone');
const previewImg = document.getElementById('previewImg');

fileInput.addEventListener('change', e => { if (e.target.files[0]) loadImage(e.target.files[0]); });

// Drag on entire source-view (works even after first upload)
const sourceView = document.getElementById('sourceView');
sourceView.addEventListener('dragover', e => { e.preventDefault(); if (sourceMode === 'upload') uploadZone.classList.add('dragover'); });
sourceView.addEventListener('dragleave', e => { if (!sourceView.contains(e.relatedTarget)) uploadZone.classList.remove('dragover'); });
sourceView.addEventListener('drop', e => { e.preventDefault(); uploadZone.classList.remove('dragover'); if (e.dataTransfer.files[0]) { if (sourceMode !== 'upload') switchSource('upload'); loadImage(e.dataTransfer.files[0]); } });

// Click preview to re-upload
previewImg.addEventListener('click', () => fileInput.click());

function loadImage(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      // Compress: max 1280px, JPEG 70%
      const MAX = 1280;
      let w = img.width, h = img.height;
      if (w > MAX || h > MAX) { const r = Math.min(MAX/w, MAX/h); w = Math.round(w*r); h = Math.round(h*r); }
      const c = document.createElement('canvas'); c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      const compressed = c.toDataURL('image/jpeg', 0.7);
      uploadedBase64 = compressed.split(',')[1];
      previewImg.src = compressed;
      previewImg.style.display = 'block';
      uploadZone.classList.remove('active');
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function setStatus(text, analyzing) {
  document.getElementById('statusText').textContent = text;
  document.getElementById('cameraStatus').classList.toggle('analyzing', analyzing);
}

function captureFrame() {
  if (sourceMode === 'upload' && uploadedBase64) return uploadedBase64;
  canvas.width = video.videoWidth; canvas.height = video.videoHeight;
  ctx.drawImage(video, 0, 0);
  const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
  // Show captured frame thumbnail
  const cf = document.getElementById('capturedFrame');
  document.getElementById('capturedImg').src = dataUrl;
  cf.classList.add('visible');
  setTimeout(() => cf.classList.remove('visible'), 3000);
  return dataUrl.split(',')[1];
}

async function analyze() {
  const apiKey = document.getElementById('apiKey').value.trim();
  const baseUrl = document.getElementById('baseUrl').value.trim() || undefined;
  const model = document.getElementById('modelName').value.trim() || undefined;
  const provider = document.getElementById('providerSelect').value;
  if (!apiKey) { alert('请输入密钥'); return; }
  setStatus('分析中', true);
  document.getElementById('analyzingState').classList.add('visible');
  document.getElementById('emptyState').style.display = 'none';
  const base64 = captureFrame();
  if (!base64) { setStatus('无画面', false); return; }

  try {
  const userContent = document.getElementById('userContent').value.trim();
  const userPrompt = userContent
    ? `分析这个场景。你看到了哪些人和设备？AI 现在需要告知用户以下内容：「${userContent}」——请根据场景推荐最佳的交互方式来传达这个信息。`
    : '分析这个场景。你看到了哪些人和设备？现在 AI 用什么方式交互最合适？';

    const result = await AgenticCore.agenticAsk(
      userPrompt,
      { provider, apiKey, baseUrl, model, tools: [], stream: false, system: SYSTEM_PROMPT, images: [{ data: base64, media_type: 'image/jpeg' }] },
      () => {}
    );
    const content = typeof result === 'string' ? result : result.answer || result;
    let parsed;
    try { parsed = JSON.parse(content.replace(/```json\n?/g, '').replace(/```\n?/g, '').trim()); } catch { parsed = null; }
    if (parsed) { renderAnalysis(parsed); history.unshift({ time: new Date(), data: parsed }); if (history.length > 20) history.pop(); renderHistory(); }
    else { document.getElementById('rawOutput').textContent = content; document.getElementById('rawOutput').classList.add('visible'); document.getElementById('analyzingState').classList.remove('visible'); }
    setStatus(isRunning ? '扫描中' : '实时', false);
  } catch (e) {
    setStatus('错误', false);
    document.getElementById('analyzingState').classList.remove('visible');
    document.getElementById('rawOutput').textContent = '错误: ' + e.message;
    document.getElementById('rawOutput').classList.add('visible');
  }
}

function renderAnalysis(data) {
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('analyzingState').classList.remove('visible');

  const people = data.people || [];
  const devices = data.devices || [];
  const rec = data.recommendation || {};

  // ── Scene Topology SVG ──
  renderTopology(people, devices, rec);
  document.getElementById('sceneTopo').style.display = '';

  // ── Interaction Card ──
  document.getElementById('icChannel').textContent = `${getChannelIcon(rec.primary_channel)} ${rec.primary_channel || '—'}`;
  document.getElementById('icStyle').textContent = rec.interaction_style || rec.modality || '';
  document.getElementById('icUrgency').textContent = rec.urgency || '';
  document.getElementById('icContent').textContent = rec.content || rec.example || '';
  document.getElementById('icReason').textContent = rec.reason || '';
  document.getElementById('icExample').textContent = rec.example ? `示例：${rec.example}` : '';
  document.getElementById('interactionCard').style.display = '';

  // Detected list
  const items = [
    ...people.map(p => ({ icon: '👤', name: p.description, type: `${p.activity} · ${p.attention}` })),
    ...devices.map(d => ({ icon: getDeviceIcon(d.type), name: d.description, type: `${d.type} · ${d.screen_state}` }))
  ];
  document.getElementById('detectedList').innerHTML = items.map(i => `<div class="det-item"><div class="di-icon">${i.icon}</div><div class="di-name">${i.name}</div><div class="di-type">${i.type}</div></div>`).join('');

  // Context tags
  const scene = data.scene || {};
  const tags = [scene.setting, scene.lighting, scene.noise_level, scene.activity_type, ...(data.context_tags || [])].filter(Boolean);
  document.getElementById('contextTags').innerHTML = tags.map(t => `<div class="ctx-tag">${t}</div>`).join('');

  // Alt
  const alt = data.alternative;
  document.getElementById('altText').textContent = alt ? `${getChannelIcon(alt.channel)} ${alt.channel}：${alt.reason}` : '';

  document.getElementById('detailGrid').style.display = '';
  document.getElementById('rawOutput').textContent = JSON.stringify(data, null, 2);
}

function renderTopology(people, devices, rec) {
  const svg = document.getElementById('topoSvg');
  const devCount = devices.length;
  const pplCount = people.length;
  const totalNodes = devCount + pplCount;

  // Dynamic viewBox based on node count
  const W = 600, H = Math.max(200, Math.min(400, totalNodes * 45));
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);

  const aiX = 50, aiY = H / 2;
  const devX = W * 0.35, pplX = W * 0.82;
  const aiR = 20, devR = 14, pplR = 14;

  let s = '';

  // AI node
  s += `<circle cx="${aiX}" cy="${aiY}" r="${aiR+6}" class="topo-ai-glow"/>`;
  s += `<text x="${aiX}" y="${aiY+4}" text-anchor="middle" style="font-size:16px;fill:var(--text)">🤖</text>`;
  s += `<text x="${aiX}" y="${aiY+aiR+14}" text-anchor="middle" style="font-size:7px;fill:var(--accent);font-family:var(--mono)">AI</text>`;

  // Layout helper
  const yPos = (i, count, margin) => {
    if (count === 1) return H / 2;
    const usable = H - margin * 2;
    return margin + usable * i / (count - 1);
  };

  // Devices
  devices.forEach((d, i) => {
    const y = yPos(i, devCount, 30);
    const isTarget = rec.target_device === d.id || rec.target_device === d.description || (devCount === 1);
    const cls = isTarget ? 'topo-device-ring active' : 'topo-device-ring';
    const pathCls = isTarget ? 'topo-path' : 'topo-path alt';

    // AI → device
    s += `<path d="M${aiX+aiR},${aiY} C${aiX+60},${aiY} ${devX-50},${y} ${devX-devR},${y}" class="${pathCls}"/>`;
    s += `<circle cx="${devX}" cy="${y}" r="${devR}" class="${cls}"/>`;
    s += `<text x="${devX}" y="${y+4}" text-anchor="middle" style="font-size:12px">${getDeviceIcon(d.type)}</text>`;
    s += `<text x="${devX}" y="${y+devR+10}" text-anchor="middle" style="font-size:6px;fill:var(--text3);font-family:var(--sans)">${d.description.slice(0,10)}</text>`;

    // Device → people
    people.forEach((p, j) => {
      const py = yPos(j, pplCount, 30);
      const isPrimary = isTarget && (rec.target_person === p.id || rec.target_person === '所有人');
      s += `<path d="M${devX+devR},${y} C${devX+50},${y} ${pplX-50},${py} ${pplX-pplR},${py}" class="${isPrimary ? 'topo-path' : 'topo-path alt'}"/>`;
    });
  });

  // No devices → direct AI→people
  if (devCount === 0) {
    people.forEach((p, j) => {
      const py = yPos(j, pplCount, 30);
      s += `<path d="M${aiX+aiR},${aiY} C${W*0.3},${aiY} ${W*0.6},${py} ${pplX-pplR},${py}" class="topo-path"/>`;
    });
  }

  // People
  people.forEach((p, i) => {
    const y = yPos(i, pplCount, 30);
    s += `<circle cx="${pplX}" cy="${y}" r="${pplR}" class="topo-person-ring"/>`;
    s += `<text x="${pplX}" y="${y+4}" text-anchor="middle" style="font-size:11px">👤</text>`;
    s += `<text x="${pplX}" y="${y+pplR+10}" text-anchor="middle" style="font-size:6px;fill:var(--text3);font-family:var(--sans)">${p.description.slice(0,10)}</text>`;
    const attnColor = p.attention === '专注' ? 'var(--warm)' : p.attention === '空闲' ? 'var(--accent)' : 'var(--text3)';
    s += `<text x="${pplX}" y="${y-pplR-4}" text-anchor="middle" style="font-size:5px;fill:${attnColor};font-family:var(--mono)">${p.attention}</text>`;
  });

  // Channel label
  if (rec.primary_channel) {
    const lx = aiX + 40, ly = aiY - 14;
    s += `<rect x="${lx}" y="${ly}" width="60" height="13" rx="3" fill="rgba(74,222,128,0.1)" stroke="rgba(74,222,128,0.15)" stroke-width="0.5"/>`;
    s += `<text x="${lx+30}" y="${ly+9}" text-anchor="middle" style="font-size:6px;fill:var(--accent);font-family:var(--mono)">${getChannelIcon(rec.primary_channel)} ${rec.primary_channel}</text>`;
  }

  svg.innerHTML = s;
}

function renderHistory() {
  if (!history.length) return;
  document.getElementById('historySection').style.display = '';
  document.getElementById('historyList').innerHTML = history.slice(0, 8).map(h => {
    const r = h.data.recommendation || {};
    return `<div class="hist-item"><div class="hist-time">${h.time.toLocaleTimeString()}</div><div class="hist-text">${getChannelIcon(r.primary_channel)} ${r.primary_channel} → ${r.target_device || '环境'}</div></div>`;
  }).join('');
}

function toggleAnalysis() {
  const btn = document.getElementById('startBtn');
  if (isRunning) { clearInterval(analysisInterval); isRunning = false; btn.textContent = '开始'; btn.className = 'btn primary'; setStatus('实时', false); }
  else { isRunning = true; btn.textContent = '停止'; btn.className = 'btn danger'; setStatus('扫描中', false); analyze(); analysisInterval = setInterval(analyze, parseInt(document.getElementById('intervalSelect').value)); }
}
function analyzeOnce() {
  // In camera mode, capture frame and switch to upload view to show it
  if (sourceMode === 'camera') {
    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0);
    const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
    uploadedBase64 = dataUrl.split(',')[1];
    previewImg.src = dataUrl;
    switchSource('upload');
    previewImg.style.display = 'block';
    uploadZone.classList.remove('active');
  }
  analyze();
}
function toggleRaw() { const r = document.getElementById('rawOutput'); r.classList.toggle('visible'); }
function toggleSettings() { document.getElementById('configPanel').classList.toggle('open'); document.getElementById('configOverlay').classList.toggle('open'); }

function getChannelIcon(ch) { return ({ '语音':'🔊','屏幕':'🖥','通知':'🔔','震动':'📳','环境光':'💡','不打扰':'🤫','文字':'💬','视觉':'👁','触觉':'📳','环境':'✨',voice:'🔊',screen:'🖥',notification:'🔔',vibration:'📳',ambient_light:'💡',none:'🤫' })[ch] || '📡'; }
function getDeviceIcon(t) { return ({ laptop:'💻',phone:'📱',tablet:'📱',tv:'📺',speaker:'🔈',watch:'⌚',monitor:'🖥' })[t] || '📟'; }

// Persist
document.getElementById('apiKey').value = localStorage.getItem('ambient_api_key') || '';
document.getElementById('baseUrl').value = localStorage.getItem('ambient_base_url') || 'https://api.openai.com/v1';
document.getElementById('modelName').value = localStorage.getItem('ambient_model') || 'gpt-4o';
document.getElementById('providerSelect').value = localStorage.getItem('ambient_provider') || 'openai';
['apiKey','baseUrl','modelName'].forEach(id => document.getElementById(id).addEventListener('change', e => localStorage.setItem('ambient_'+id.replace(/[A-Z]/g,c=>'_'+c.toLowerCase()), e.target.value)));
document.getElementById('providerSelect').addEventListener('change', e => {
  localStorage.setItem('ambient_provider', e.target.value);
  const base = document.getElementById('baseUrl'), model = document.getElementById('modelName');
  if (e.target.value === 'anthropic') { if (!base.value || base.value.includes('openai.com')) base.value = 'https://api.anthropic.com'; if (!model.value || model.value.startsWith('gpt')) model.value = 'claude-sonnet-4-20250514'; }
  else { if (!base.value || base.value.includes('anthropic.com')) base.value = 'https://api.openai.com/v1'; if (!model.value || model.value.startsWith('claude')) model.value = 'gpt-4o'; }
  localStorage.setItem('ambient_base_url', base.value); localStorage.setItem('ambient_model', model.value);
});

initCamera();
</script>
